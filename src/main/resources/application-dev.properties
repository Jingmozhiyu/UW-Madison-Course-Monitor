# ===============================
# Local MySQL Database
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/course_monitor_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf-8&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# Local JPA Settings
# ===============================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update